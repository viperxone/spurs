<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;height:100%;overflow:hidden;}
  body{
    background:#050D1A;
    font-family:'SF Mono','Fira Code','Consolas','Menlo',monospace;
    color:#C8D8F0;
    user-select:none;
  }
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;text-decoration:none;}

  /* Scrollable panels */
  .scroll{overflow-y:auto;overflow-x:hidden;}
  .scroll::-webkit-scrollbar{width:3px;}
  .scroll::-webkit-scrollbar-track{background:transparent;}
  .scroll::-webkit-scrollbar-thumb{background:#CAAB4A44;border-radius:2px;}

  /* Gold glow pulse on active nav */
  @keyframes goldPulse{0%,100%{box-shadow:0 0 6px #CAAB4A44;}50%{box-shadow:0 0 14px #CAAB4A88;}}
  .active-nav{animation:goldPulse 3s infinite;}

  /* Scan line overlay — subtle terminal feel */
  body::after{
    content:'';
    position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    pointer-events:none;z-index:9999;
  }

  /* Bar fill animation */
  @keyframes fillBar{from{width:0;}to{width:var(--w);}}
  .bar-fill{animation:fillBar 1s ease-out forwards;}

  /* Blink cursor */
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  .blink{animation:blink 1.2s infinite;}

  /* Fade in panels */
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn 0.25s ease-out;}

  /* Number counter glow */
  .gold{color:#CAAB4A;}
  .dim{color:#3A5070;}
  .muted{color:#4A6080;}
  .green{color:#00C878;}
  .red{color:#FF4455;}
  .amber{color:#E8A020;}
  .white{color:#EEF4FF;}
</style>
</head>

function Chip({label,color,bg}){
  return <span style={{background:bg||color+'22',color:color||P.gold,fontSize:8,fontWeight:700,
    letterSpacing:"0.12em",padding:"2px 6px",borderRadius:2,textTransform:"uppercase",
    border:`1px solid ${color||P.gold}44`,whiteSpace:"nowrap"}}>{label}</span>;
}

function SectionLabel({children}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <div style={{width:2,height:12,background:P.gold,borderRadius:1}}/>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.2em",color:P.gold,textTransform:"uppercase"}}>{children}</span>
      <div style={{flex:1,height:1,background:P.borderGold}}/>
    </div>
  );
}

function StatBox({label,value,color}){
  return (
    <div style={{textAlign:"center",padding:"6px 10px",background:P.bgCard,
      border:`1px solid ${P.border}`,borderRadius:4}}>
      <div style={{fontSize:18,fontWeight:900,color:color||P.gold,fontFamily:"inherit"}}>{value}</div>
      <div style={{fontSize:7,color:P.muted,letterSpacing:"0.15em",marginTop:1}}>{label}</div>
    </div>
  );
}

function Bar({value,color,max}){
  max=max||100;
  const pct=Math.min(100,(value/max)*100);
  return (
    <div style={{background:P.bgCard,borderRadius:1,height:3,overflow:"hidden"}}>
      <div className="bar-fill" style={{"--w":`${pct}%`,width:`${pct}%`,height:3,
        background:color||P.gold,borderRadius:1}}/>
    </div>
  );
}

// ── LIVE CLOCK ────────────────────────────────────────────────────────────────
function Clock(){
  const [time,setTime]=useState(new Date());
  useEffect(()=>{
    const t=setInterval(()=>setTime(new Date()),1000);
    return ()=>clearInterval(t);
  },[]);
  const pad=n=>String(n).padStart(2,'0');
  return (
    <div style={{textAlign:"right",fontFamily:"inherit"}}>
      <div style={{fontSize:18,fontWeight:900,color:P.gold,letterSpacing:"0.1em",lineHeight:1}}>
        {pad(time.getHours())}:{pad(time.getMinutes())}
        <span className="blink" style={{color:P.goldDim}}>:</span>
        {pad(time.getSeconds())}
      </div>
      <div style={{fontSize:8,color:P.muted,letterSpacing:"0.15em",marginTop:2}}>
        {time.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase()}
      </div>
    </div>
  );
}

// ── NEXT MATCH COUNTDOWN ──────────────────────────────────────────────────────
function Countdown(){
  const target=new Date('2026-08-22T15:00:00');
  const [diff,setDiff]=useState(target-new Date());
  useEffect(()=>{
    const t=setInterval(()=>setDiff(target-new Date()),1000);
    return ()=>clearInterval(t);
  },[]);
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  const pad=n=>String(n).padStart(2,'0');
  return (
    <div style={{background:P.bgCard,border:`1px solid ${P.borderGold}`,borderRadius:4,padding:"6px 12px",textAlign:"center"}}>
      <div style={{fontSize:8,color:P.muted,letterSpacing:"0.15em",marginBottom:4}}>NEXT MATCH — BRENTFORD (A) · EPL 26/27</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"baseline"}}>
        {[[d,"D"],[h,"H"],[m,"M"],[s,"S"]].map(([v,l])=>(
          <div key={l} style={{textAlign:"center"}}>
            <span style={{fontSize:16,fontWeight:900,color:P.gold,fontFamily:"inherit"}}>{pad(v)}</span>
            <span style={{fontSize:7,color:P.muted,marginLeft:1}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

        </div>
      )}
    </div>
  );
}

// ── RIGHT FEED PANEL ──────────────────────────────────────────────────────────

function WorldCupPanel(){
  const [expanded,setExpanded]=useState(null);
  const active=WC_PLAYERS.filter(p=>!p.eliminated);
  const out=WC_PLAYERS.filter(p=>p.eliminated);

  const statBox=(label,value,col)=>(
    <div style={{textAlign:"center",minWidth:36}}>
      <div style={{fontSize:14,fontWeight:900,color:col||P.gold}}>{value}</div>
      <div style={{fontSize:6,color:P.muted,letterSpacing:"0.1em"}}>{label}</div>
    </div>
  );

  const renderPlayer=(p,i)=>(
    <div key={i} style={{borderRadius:4,overflow:"hidden",
      border:`1px solid ${p.eliminated?P.red+"33":P.gold+"33"}`,
      background:P.bgCard,marginBottom:6}}>
      <div style={{padding:"10px 12px",cursor:"pointer"}}
        onClick={()=>setExpanded(expanded===i?null:i)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
              <span style={{fontSize:18}}>{p.flag}</span>
              <span style={{fontSize:12,fontWeight:800,color:P.white}}>{p.name}</span>
              <Chip label={p.pos} color={P.cyan}/>
              {p.eliminated
                ? <Chip label="ELIMINATED" color={P.red}/>
                : <Chip label="IN TOURNAMENT" color={P.green}/>
              }
            </div>
            <div style={{fontSize:9,color:P.muted,marginBottom:6}}>{p.country} · Group {p.group} · {p.status}</div>
            {/* Results */}
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
              {p.groupResults.map((r,j)=>{
                const col=r.startsWith("W")?P.green:r.startsWith("L")?P.red:r.startsWith("D")?P.amber:P.muted;
                return (
                  <span key={j} style={{fontSize:8,padding:"2px 5px",background:col+"22",
                    border:`1px solid ${col}44`,borderRadius:2,color:col,fontWeight:700}}>{r}</span>
                );
              })}
            </div>
          </div>
          {/* Rating */}
          <div style={{textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:20,fontWeight:900,
              color:p.rating==="—"?P.muted:parseFloat(p.rating)>=7.5?P.green:parseFloat(p.rating)>=6.5?P.gold:P.amber}}>
              {p.rating}
            </div>
            <div style={{fontSize:6,color:P.muted}}>AVG RTG</div>
          </div>
        </div>

        {/* Stats row */}
        <div style={{display:"flex",gap:12,alignItems:"center",
          padding:"6px 8px",background:P.bgPanel,borderRadius:3}}>
          {statBox("GP",    p.gp,     P.white)}
          <div style={{width:1,height:20,background:P.border}}/>
          {statBox("XI",    p.xi,     P.green)}
          {statBox("SUB↑",  p.sub,    P.amber)}
          {statBox("BENCH", p.benched,P.muted)}
          <div style={{width:1,height:20,background:P.border}}/>
          {statBox("⚽",    p.goals,  P.gold)}
          {statBox("🎯",    p.assists,P.cyan)}
        </div>
        <div style={{marginTop:5,fontSize:8,color:P.muted}}>{expanded===i?"▲ collapse":"▾ expand notes"}</div>
      </div>
      {expanded===i&&(
        <div style={{padding:"0 12px 10px",borderTop:`1px solid ${P.border}`}}>
          <div style={{paddingTop:8,fontSize:11,color:P.text,lineHeight:1.8}}>{p.notes}</div>
          <div style={{marginTop:6,fontSize:8,color:P.gold,fontWeight:700}}>{p.teamProgress}</div>
        </div>
      )}
    </div>
  );

  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Header stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[
          {label:"Still In",    v:WC_PLAYERS.filter(p=>!p.eliminated).length,   col:P.green},
          {label:"Eliminated",  v:WC_PLAYERS.filter(p=>p.eliminated).length,    col:P.red},
          {label:"Total Goals", v:WC_PLAYERS.reduce((a,p)=>a+(p.goals||0),0),   col:P.gold},
          {label:"Total Assists",v:WC_PLAYERS.reduce((a,p)=>a+(p.assists||0),0),col:P.cyan},
        ].map((s,i)=>(
          <div key={i} style={{padding:"10px 12px",background:P.bgCard,borderRadius:4,
            border:`1px solid ${P.border}`,borderTop:`2px solid ${s.col}`,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:s.col}}>{s.v}</div>
            <div style={{fontSize:8,color:P.muted,letterSpacing:"0.1em"}}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {/* Live / In tournament */}
      <div>
        <SectionLabel>🟢 Still In Tournament ({active.length} players)</SectionLabel>
        {active.map((p,i)=>renderPlayer(p,i))}
      </div>

      {/* Eliminated */}
      <div>
        <SectionLabel>🔴 Eliminated ({out.length} players)</SectionLabel>
        {out.map((p,i)=>renderPlayer(p,active.length+i))}
      </div>

      <div style={{padding:"8px 12px",background:P.bgCard,border:`1px solid ${P.borderGold}`,
        borderRadius:4,fontSize:9,color:P.muted,lineHeight:1.8}}>
        <span style={{color:P.gold}}>DATA SOURCE:</span> Group stage results from ESPN/Wikipedia/FourFourTwo/FOXSports.
        Individual stats (apps, goals, assists) from match reports. Ratings estimated from match reports (Sofascore-style 1-10).
        Updated after group stage completion 27 Jun 2026. Gallagher & Maddison — not in England squad per official FA announcement.
        <br/><span style={{color:P.amber}}>⚡ Round of 32 begins Jun 28 — stats will update as tournament progresses.</span>
      </div>
    </div>
  );
}


function RightFeed(){
  const statusCol=s=>s==="hot"?P.green:s==="warm"?P.amber:P.muted;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14,height:"100%"}}>

      {/* Transfer Alerts */}
      <div>
        <SectionLabel>Transfer Alerts</SectionLabel>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {TRANSFER_BRIEFS.slice(0,4).map((r,i)=>(
            <div key={i} style={{padding:"8px 10px",background:P.bgCard,borderRadius:3,
              border:`1px solid ${statusCol(r.status)}22`,borderLeft:`2px solid ${statusCol(r.status)}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:700,color:P.white}}>{r.nat} {r.player}</span>
                <span style={{fontSize:9,fontWeight:800,color:statusCol(r.status)}}>{r.likelihood}%</span>
              </div>
              <div style={{fontSize:9,color:P.muted,marginTop:2}}>from {r.from} · {r.fee}</div>
              <div style={{marginTop:4}}>
                <Bar value={r.likelihood} color={statusCol(r.status)}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Injury Alerts */}
      <div>
        <SectionLabel>Injury Alerts</SectionLabel>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {INJURIES.map((inj,i)=>(
            <div key={i} style={{padding:"7px 10px",background:P.bgCard,borderRadius:3,
              border:`1px solid ${P.border}`,borderLeft:`2px solid ${inj.sev==="long"?P.red:P.amber}`}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:10,fontWeight:600,color:P.white}}>{inj.nat} {inj.name}</span>
                <span style={{fontSize:8,color:inj.sev==="long"?P.red:P.amber}}>{inj.ret}</span>
              </div>
              <div style={{fontSize:8,color:P.muted,marginTop:1}}>{inj.issue}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Latest News Feed */}
      <div style={{flex:1}}>
        <SectionLabel>Latest Headlines</SectionLabel>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {NEWS.slice(0,6).map((n,i)=>{
            const col=n.tag==="Official"?P.gold:n.tag==="Transfer"?P.green:n.tag==="Fixtures"?P.amber:P.muted;
            return (
              <a key={i} href={n.url} target="_blank" rel="noopener noreferrer"
                style={{display:"block",padding:"7px 10px",background:P.bgCard,borderRadius:3,
                  border:`1px solid ${P.border}`,borderLeft:`2px solid ${col}`,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=P.bgHover}
                onMouseLeave={e=>e.currentTarget.style.background=P.bgCard}>
                <div style={{fontSize:9,fontWeight:600,color:P.text,lineHeight:1.5}}>{n.title}</div>
                <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center"}}>
                  <span style={{fontSize:7,color:col,fontWeight:700,letterSpacing:"0.1em"}}>{n.tag.toUpperCase()}</span>
                  <span style={{fontSize:7,color:P.muted}}>{n.source}</span>
                  <span style={{fontSize:7,color:P.muted}}>{n.date}</span>
                </div>
              </a>
            );
          })}
        </div>
      </div>

      {/* Confirmed Signings mini */}
      <div>
        <SectionLabel>Summer Signings ✓</SectionLabel>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {CONFIRMED_SIGNINGS.map((s,i)=>(
            <div key={i} style={{padding:"6px 10px",background:P.bgCard,borderRadius:3,
              border:`1px solid ${P.green}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:10,color:P.white}}>{s.nat} {s.player}</span>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:9,color:P.gold,fontWeight:700}}>{s.fee}</span>
                <Chip label={s.role} color={P.cyan}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  {id:"overview",  icon:"◈", label:"OVERVIEW"},
  {id:"injuries",  icon:"✚", label:"INJURIES"},
  {id:"squad",     icon:"▦", label:"SQUAD"},
  {id:"transfers", icon:"⇄", label:"TRANSFERS"},
  {id:"news",      icon:"◉", label:"NEWS"},
  {id:"records",   icon:"★", label:"RECORDS"},
  {id:"worldcup",  icon:"🏆", label:"WORLD CUP"},
];

function App(){

    overview: <OverviewPanel/>,

        </div>
        <div style={{flex:1}}/>

      </div>

      {/* BODY — 3 columns */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* LEFT NAV RAIL */}
        <div style={{width:72,background:P.bgPanel,borderRight:`1px solid ${P.border}`,
          display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 0",gap:4,flexShrink:0}}>

                borderLeft:active===item.id?`2px solid ${P.gold}`:"2px solid transparent",
              }}>
              <span style={{fontSize:16}}>{item.icon}</span>
              <span style={{fontSize:6,letterSpacing:"0.12em",fontWeight:700}}>{item.label}</span>

        <div style={{flex:1}}/>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
