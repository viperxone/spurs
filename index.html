<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;height:100%;overflow:hidden;}
body{background:#050D1A;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#C8D8F0;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
.app-shell{height:100vh;height:100dvh;}
.scroll{overflow-y:auto;overflow-x:hidden;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:#CAAB4A55;border-radius:2px;}
@keyframes fillBar{from{width:0;}to{width:var(--w);}}
.bar-fill{animation:fillBar 1.2s ease-out forwards;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes newsFlash{0%,100%{background:#CAAB4A22;border-color:#CAAB4A88;}50%{background:#CAAB4A44;border-color:#CAAB4A;}}
.news-flash{animation:newsFlash 1.5s infinite;}
.nav-btn:not(.nav-btn-active):hover{color:#CAAB4A !important;background:#0D1E35;}
.nav-btn:not(.nav-btn-active):active{color:#EEF4FF !important;background:#0D1E35;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
.skel{background:linear-gradient(90deg,#0D1E35 25%,#132A48 37%,#0D1E35 63%);background-size:800px 100%;animation:shimmer 1.4s ease infinite;border-radius:6px;}
.squad-card{transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;}
.squad-card:hover{transform:translateY(-2px);border-color:#CAAB4A88 !important;box-shadow:0 6px 16px #0008;}
input:focus{border-color:#CAAB4A !important;box-shadow:0 0 0 3px #CAAB4A22;}
input::placeholder{color:#4A6A8A;}
</style>

"LB",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0077}\u{E006C}\u{E0073}\u{E007F}",apps:5,g:0,con:"2027",wc:null,st:"RENEWED JUN 10",sc:"green"},{name:"D. Spence",pos:"RB",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:8,g:0,con:"2029",wc:"ENG",st:"TRANSFER TALKS \u2014 INTER",sc:"amber"},{name:"A. Gray",pos:"CM",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:29,g:2,con:"2030",wc:null,st:"CORE",sc:"green"},{name:"L. Bergvall",pos:"CM",e:"\u{1F1F8}\u{1F1EA}",apps:26,g:3,con:"2031",wc:null,st:"REQUESTED \u2014 FOREST BID REJ.",sc:"red"},{name:"C. Gallagher",pos:"CM",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:28,g:2,con:"2031",wc:null,st:"CORE",sc:"green"},{name:"PM. Sarr",pos:"CM",e:"\u{1F1F8}\u{1F1F3}",apps:27,g:3,con:"2030",wc:"SEN",st:"CORE",sc:"green"},{name:"S. Tonali",pos:"DM",e:"\u{1F1EE}\u{1F1F9}",apps:0,g:0,con:"TBC",wc:null,st:"NEW \u2014 \xA3100m RECORD, 6YR (reported)",sc:"cyan"},{name:"J. Maddison",pos:"AM",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:11,g:2,con:"2028",wc:null,st:"RECOVERING (KNEE)",sc:"amber"},{name:"X. Simons",pos:"CM",e:"\u{1F1F3}\u{1F1F1}",apps:31,g:6,con:"2030",wc:null,st:"ACL \u2014 FEB 2027",sc:"red"},{name:"M. Fernandes",pos:"CM",e:"\u{1F1F5}\u{1F1F9}",apps:0,g:0,con:"TBC",wc:null,st:"SIGNING \u2014 \xA385m RECORD",sc:"cyan"},{name:"D. Kulusevski",pos:"RW",e:"\u{1F1F8}\u{1F1EA}",apps:0,g:0,con:"2028",wc:null,st:"OUT ALL SEASON \u2014 KNEE",sc:"red"},{name:"M. Kudus",pos:"FW",e:"\u{1F1EC}\u{1F1ED}",apps:26,g:6,con:"2031",wc:null,st:"BACK IN TRAINING \u2014 Aug 22",sc:"green"},{name:"M. Tel",pos:"FW",e:"\u{1F1EB}\u{1F1F7}",apps:28,g:7,con:"2031",wc:null,st:"LOAN \u2014 BAYERN",sc:"amber"},{name:"D. Solanke",pos:"ST",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:19,g:5,con:"2030",wc:null,st:"HAMSTRING",sc:"amber"},{name:"Richarlison",pos:"ST",e:"\u{1F1E7}\u{1F1F7}",apps:24,g:8,con:"2027",wc:null,st:"SALE EXPECTED",sc:"amber"},{name:"W. Odobert",pos:"LW",e:"\u{1F1EB}\u{1F1F7}",apps:20,g:2,con:"2029",wc:null,st:"ACL \u2014 NOV 2026",sc:"red"}],INJURIES=[{name:"Xavi Simons",flag:"NL",emoji:"\u{1F1F3}\u{1F1F1}",pos:"CM",issue:"ACL right knee",sev:"long",ret:"20 Feb 2027"},{name:"Wilson Odobert",flag:"FR",emoji:"\u{1F1EB}\u{1F1F7}",pos:"LW",issue:"ACL left knee",sev:"long",ret:"28 Nov 2026"},{name:"Dejan Kulusevski",flag:"SE",emoji:"\u{1F1F8}\u{1F1EA}",pos:"RW",issue:"Knee (patella/cartilage) \u2014 has not played a competitive match since May 2025. Missed the entire 2025/26 season and was left out of Sweden's 2026 World Cup squad. Multiple surgeries; club and national team doctors remain cautiously optimistic he returns for 2026/27.",sev:"long",ret:"TARGETING 2026/27 SEASON \u2014 no confirmed date"}],TRANSFER_BRIEFS=[{player:"Rafael Leao",e:"\u{1F1F5}\u{1F1F9}",from:"AC Milan",fee:"60m",like:72,st:"hot",date:"16 Jul",brief:"Leao has agreed personal terms and, per multiple outlets (football365, GiveMeSport, TNT Sports), has told Spurs he's ready to say yes even without Champions League football \u2014 a huge boost given the rival interest. New Milan boss Ruben Amorim has sanctioned an exit, deeming him surplus to requirements. Milan want \u20AC60m (~\xA351m) for a permanent deal but would consider an initial loan with an obligation to buy at a similar figure. Jorge Mendes is driving the deal. Saudi Pro League clubs remain circling as a fallback for the player, but Spurs are seen as the front-runners as of mid-July."},{player:"Savinho",e:"\u{1F1E7}\u{1F1F7}",from:"Man City",fee:"60m",like:78,st:"hot",date:"17 Jul",brief:"Now the most advanced of Spurs' two winger pursuits. Romano has reiterated \u2014 pinning his own earlier reporting back to the top of his feed \u2014 that Savinho has already said yes to the move and is being described as Tottenham's 'next big name' and likely seventh major signing of the summer. Personal terms are done; Spurs are waiting on City's final sign-off with conversations 'ongoing' and City reportedly willing to sell for around \xA360m this time (they blocked it last summer while chasing Rodrygo as a replacement, which never materialised, and re-signed Savinho instead). With City no longer holding out for a like-for-like replacement, this looks like the closest of all of Spurs' winger targets to being done \u2014 marginally ahead of Leao on advancement, even if Leao's is the flashier name."},{player:"Carlos Baleba",e:"\u{1F1E8}\u{1F1F2}",from:"Brighton",fee:"100m",like:38,st:"warm",date:"14 Jul",brief:"One of three De Zerbi ex-Brighton targets (with Verbruggen; Van Hecke already signed). De Zerbi worked closely with Baleba at Brighton \u2014 37 games together \u2014 and rates him highly. His valuation has climbed sharply since De Zerbi signed him for \xA323.3m in 2024, with reports now pricing him as high as \xA3100m, which has cooled the pace of any move. Man Utd interest previously reported has gone quiet; Spurs could revisit if that move stays dead. Club acknowledges landing all three Brighton targets in one window is unlikely."},{player:"Bart Verbruggen",e:"\u{1F1F3}\u{1F1F1}",from:"Brighton",fee:"30m",like:35,st:"warm",date:"14 Jul",brief:"Still De Zerbi's preferred long-term No.1 \u2014 Dubravka was always a short-term/backup solution. Verbruggen remains attracting interest from elsewhere in Europe, so competition is a live risk. Vicario sale proceeds earmarked to help fund this move. Considered the more advanced of the two remaining Brighton targets given goalkeeper is a clearer positional priority than a third-choice CM."},{player:"Eli Junior Kroupi",e:"\u{1F1EB}\u{1F1F7}",from:"Bournemouth",fee:"85m",like:28,st:"warm",date:"12 Jul",brief:"Spurs have lined up a big offer (~\xA385m) but Bournemouth's stance has hardened further: new manager Marco Rose wants his strongest possible squad for his first season, there's no financial pressure to sell, and the club is wary of losing another breakout academy-to-first-team star having watched this happen before. He's contracted to 2030 with no release clause. Arsenal, Liverpool, Chelsea, Man Utd and Barcelona are all also credited with interest, which further reduces Spurs' odds of a deal getting done. Increasingly looks like a 2027 target rather than this summer."},{player:"Maghnes Akliouche",e:"\u{1F1EB}\u{1F1F7}",from:"Monaco",fee:"60m",like:18,st:"cold",date:"16 Jul",brief:"Spurs have made contact over a deal (~\xA360m) and he was on the club's radar last summer and again in January. But PSG are firmly leading the race and talks between Monaco and PSG have been progressing \u2014 the player himself reportedly wants to stay in France with the Ligue 1 champions. Monitor only; not a live priority while PSG remain favourites."}],CONFIRMED=[{player:"Sandro Tonali",e:"\u{1F1EE}\u{1F1F9}",from:"Newcastle",fee:"100m",role:"DM",date:"2026-07-03",note:"Confirmed by BBC, Sky Sports, football.london and Romano. Initial fee \xA392.5m rising to \xA3100m with add-ons. 6-year deal. De Zerbi connection central to move. Role confirmed as DM (his primary position at Milan/Newcastle)."},{player:"Mateus Fernandes",e:"\u{1F1F5}\u{1F1F9}",from:"West Ham",fee:"85m",role:"CM",date:"1 Jul 2026",note:"CLUB RECORD. Romano + Ornstein confirmed. Medical underway. Beats Man Utd to signing."},{player:"JP van Hecke",e:"\u{1F1F3}\u{1F1F1}",from:"Brighton",fee:"52m",role:"CB",date:"Jun 2026",note:"5-yr deal. De Zerbi reunion. At WC with Netherlands."},{player:"A. Robertson",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}",from:"Liverpool",fee:"Free",role:"LB",date:"Jun 2026",note:"Experience and cover at LB."},{player:"M. Senesi",e:"\u{1F1E6}\u{1F1F7}",from:"Bournemouth",fee:"Free",role:"CB",date:"Jun 2026",note:"AFC Bournemouth's Players' Player of the Year. 4-yr deal."},{player:"M. Dubravka",e:"\u{1F1F8}\u{1F1F0}",from:"Burnley",fee:"Free",role:"GK",date:"24 Jun 2026",note:"Joins Jul 1. Backup to Kinsky. 60 Slovakia caps."}],DEPARTURES=[{player:"G. Vicario",note:"Juventus CEO Giovanni Carnevali has confirmed direct interest; Spalletti has spoken to Vicario personally. Spurs have set a \u20AC15m asking price (negotiable). Complication: Vicario wants ~\u20AC4m/yr after tax, above Juve's wage discipline, and Juve's actual first choice is Aston Villa's Emi Mart\xEDnez (who Villa won't sell) \u2014 Vicario is the fallback. A loan-with-option is being discussed as a compromise. Drags into August."},{player:"C. Romero",note:"Expected to leave this summer per multiple mid-July reports. Spurs have set a \u20AC50m (~\xA342-43m) asking price. Romero's own preference is a return to Spain with Barcelona, though no formal bid is in yet. Inter Milan explored a move (raised while discussing Djed Spence) but see a fee near \u20AC60m as too rich. Atl\xE9tico Madrid also mentioned. No bid lodged as of 17 Jul, but Spurs look increasingly resigned to selling before the window shuts."},{player:"D. Spence",note:"Inter Milan in talks (Romano) after losing Denzel Dumfries to Real Madrid \u2014 see him as their top right wing-back target. De Zerbi has told Spence directly he's not part of next season's plans. Valuation gap: Spurs want ~\xA340m, Inter want to pay \u20AC25-30m (~\xA321-26m). Liverpool also credited with interest, which could push the fee up."},{player:"L. Bergvall",note:"Handed in a transfer request citing lack of first-team football (112 mins under De Zerbi all season). Nottingham Forest had an opening \xA338m bid rejected and are expected to return with an improved offer \u2014 the chance to work under Oliver Glasner is reportedly a big pull for the player. Spurs are willing to sell but only on their valuation; will keep him if it isn't met."},{player:"Richarlison",note:"Spurs are ready to sell with a year left on his deal, partly to manage Profit & Sustainability Rules headroom after the Fernandes/Tonali spend. Asking price reported between \u20AC20-30m. Juventus have joined the race as a fallback if their move for PSG's Kolo Muani fails; an unnamed Turkish club and Orlando City (MLS) have also been mentioned, Everton links have gone cold."},{player:"J. Palhinha",note:"Loan spell ended and Tottenham's move to sign him permanently is now 100% dead (reliable reporting, 10 Jul) \u2014 the player has posted a farewell message to Spurs fans, contract expired 30 Jun. No permanent destination confirmed yet: Sporting CP are the most consistent link (Palhinha open to a return to Portugal) with Bayern wanting a sale rather than a loan; Benfica, Juventus and Aston Villa also mentioned."},{player:"Luka Vuskovic",note:"Sale to Brighton agreed \u2014 \xA346m (BBC), with a significant sell-on clause. 19-year-old Croatian CB had never made a senior Spurs appearance."},{player:"Y. Bissouma",note:"Released \u2014 contract expired Jun 30 (Official)"},{player:"A. Veliz",note:"SOLD \u2014 Bahia \xA37.8m + add-ons + 20% sell-on. Effective 1 Jul 2026 (Official)"},{player:"Kolo Muani",note:"Loan ended \u2014 returned to PSG"},{player:"R. Bentancur",note:"Contract expired Jun 30 \u2014 at WC with Uruguay"}],ANON_BRIEFS=[{date:"17 Jul",text:"Two stories settled, for the record. Kane: he's chosen not to trigger his release clause and is signing a one-year extension at Bayern \u2014 the reunion talk was real interest, not fiction, but it's off for now. Archie Gray: Newcastle's swap approach and the 'sources deny a bid' story both went nowhere \u2014 De Zerbi has told the squad directly that Gray isn't for sale at any price, full stop. Neither needs further tracking as a live rumour."},{date:"16 Jul",text:"Word inside the building is that this is no longer a straight Leao-or-Savinho call \u2014 with Fernandes and Tonali paid for, the recruitment team believe there's a route to funding both if the outgoing pipeline (Romero, Spence, Richarlison, Vicario) clears in time. PSR headroom is the real constraint now, not scouting conviction. Staff are said to be quietly confident Leao gets prioritised first given the personal terms are furthest along."},{date:"9 Jul",text:"Word inside the building is that the mood has shifted decisively toward Leao over the last few days. Savinho was the long-standing priority, but sources close to the recruitment team say the player's willingness to accept a move without Champions League football \u2014 something Savinho's camp were said to be less relaxed about \u2014 tipped the internal debate. Kroupi is increasingly viewed as a 2027 target rather than this summer, given Bournemouth's refusal to engage."},{date:"4 Jul",text:"Whispers from inside Hotspur Way suggest Bergvall's situation is more complicated than the official line. The club told him firmly he won't be sold cheaply \u2014 but staff privately acknowledge the player's discontent is genuine. Whether that quiet understanding leads anywhere before the window closes is a question nobody inside N17 is answering directly."},{date:"4 Jul",text:"Vicario's camp are playing hardball. The goalkeeper is understood to be pushing for guarantees over his next destination before greenlighting any exit \u2014 Juventus are keen but the player hasn't committed. The training ground view is that this one drags into August."},{date:"1 Jul",text:"The mood inside the training ground following the Fernandes agreement is described as genuinely electric. De Zerbi has been hands-on in every negotiation this summer \u2014 a stark contrast to previous regimes."},{date:"30 Jun",text:"Word from N17 is that Tonali has been told by his own representatives to be patient \u2014 Spurs are not walking away. The club view the Fernandes deal as proof they can now compete for any target."},{date:"28 Jun",text:"Sources suggest Bergvall's exit is being treated internally as a blessing \u2014 De Zerbi was always planning to reshape the midfield and the transfer fee received will help fund further business."},{date:"25 Jun",text:"Background chatter suggests Vicario exit could be finalised within days once a buying club agrees personal terms \u2014 internally seen as a formality. Kinsky's new deal was fast-tracked to close the door on any suitors."}],CONFIRMED_SPEND=[{player:"Sandro Tonali",from:"Newcastle",fee:100,note:"Initial \xA392.5m, could rise to \xA3100m with add-ons"},{player:"Mateus Fernandes",from:"West Ham",fee:85,note:"Club record fee"},{player:"JP van Hecke",from:"Brighton",fee:52,note:""},{player:"Andy Robertson",from:"Liverpool",fee:0,note:"Free transfer \u2014 wage cost only, not reflected here"},{player:"Marcos Senesi",from:"Bournemouth",fee:0,note:"Free transfer \u2014 wage cost only, not reflected here"},{player:"Martin Dubravka",from:"Burnley",fee:0,note:"Free transfer \u2014 wage cost only, not reflected here"}],CONFIRMED_INCOME=[{player:"Luka Vuskovic",to:"Brighton",fee:46,note:"Plus a significant sell-on clause"},{player:"Antonio Veliz",to:"Bahia",fee:7.8,note:"Plus add-ons + 20% sell-on"},{player:"Yves Bissouma",to:"\u2014",fee:0,note:"Released \u2014 wage saving only, no fee"},{player:"Rodrigo Bentancur",to:"\u2014",fee:0,note:"Contract expired \u2014 wage saving only, no fee"}],IN_PROGRESS_SALES=[{player:"Richarlison",to:"Juventus (fallback) / Turkey / Orlando City",askGBP:21,likelihood:65,note:"\u20AC20-30m asking range, using midpoint. PSR/SCR-driven sale."},{player:"Guglielmo Vicario",to:"Juventus (loan+option discussed)",askGBP:13,likelihood:65,note:"\u20AC15m asking price, described as negotiable"},{player:"Cristian Romero",to:"Barcelona preferred / Inter interest",askGBP:43,likelihood:60,note:"\u20AC50m asking price, no formal bid yet"},{player:"Djed Spence",to:"Inter Milan (in talks)",askGBP:40,likelihood:55,note:"Spurs want \xA340m; Inter offering only \u20AC25-30m (~\xA322-26m) \u2014 real gap"},{player:"Lucas Bergvall",to:"Nottingham Forest (\xA338m bid rejected)",askGBP:38,likelihood:55,note:"Forest expected to return with an improved offer"}],IN_PROGRESS_BUYS=[{player:"Savinho",from:"Man City",feeGBP:60,likelihood:78},{player:"R
