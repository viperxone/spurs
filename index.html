*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;height:100%;overflow:hidden;}
body{background:#050D1A;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#C8D8F0;font-size:14px;}
button{font-family:inherit;cursor:pointer;}a{color:inherit;text-decoration:none;}
.scroll{overflow-y:auto;overflow-x:hidden;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:#CAAB4A55;border-radius:2px;}
@keyframes goldPulse{0%,100%{box-shadow:0 0 8px #CAAB4A55;}50%{box-shadow:0 0 20px #CAAB4A99;}}
@keyframes fillBar{from{width:0;}to{width:var(--w);}}
.bar-fill{animation:fillBar 1.2s ease-out forwards;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes newsFlash{0%,100%{background:#CAAB4A22;border-color:#CAAB4A88;}50%{background:#CAAB4A44;border-color:#CAAB4A;}}
.news-flash{animation:newsFlash 1.5s infinite;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
</style>

function Countdown(){

function NewsPanel(){
  const [items,setItems]=useState(NEWS);
  const [loading,setLoading]=useState(true);
  const [live,setLive]=useState(false);

  useEffect(()=>{
    const proxy="https://api.allorigins.win/raw?url=";
    const feedUrl=encodeURIComponent("https://news.google.com/rss/search?q=Tottenham+Hotspur+when:7d&hl=en-GB&gl=GB&ceid=GB:en");
    fetch(proxy+feedUrl)
      .then(r=>r.text())
      .then(txt=>{
        const parser=new DOMParser();
        const xml=parser.parseFromString(txt,"text/xml");
        const entries=Array.from(xml.querySelectorAll("item")).slice(0,15);
        if(entries.length===0) throw new Error("empty feed");
        const parsed=entries.map(e=>{
          const title=e.querySelector("title")?.textContent||"";
          const link=e.querySelector("link")?.textContent||"#";
          const pubDate=e.querySelector("pubDate")?.textContent||"";
          const source=e.querySelector("source")?.textContent||"Google News";
          const d=pubDate?new Date(pubDate):new Date();
          const dateStr=d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
          let tag="Club";
          const lt=title.toLowerCase();
          if(lt.includes("sign")||lt.includes("contract")||lt.includes("official")) tag="Official";
          else if(lt.includes("transfer")||lt.includes("target")||lt.includes("bid")||lt.includes("link")) tag="Transfer";
          else if(lt.includes("fixture")||lt.includes("kick-off")) tag="Fixtures";
          else if(lt.includes("says")||lt.includes("interview")||lt.includes("'")) tag="Interview";
          return {title,source,date:dateStr,tag,url:link};
        });
        setItems(parsed);
        setLive(true);
        setLoading(false);
      })
      .catch(()=>{
        setItems(NEWS);
        setLive(false);
        setLoading(false);
      });
  },[]);

  const tagC=t=>t==="Official"?P.gold:t==="Transfer"?P.green:t==="Fixtures"?P.amber:P.muted;
  const tagB=t=>t==="Official"?P.gold:t==="Transfer"?P.green:t==="Fixtures"?P.amber:P.border;

  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:8}}>
      <WH lg>News Centre — Newest First</WH>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <span style={{fontSize:12,color:P.muted}}>Tap any headline to open the source in a new tab.</span>
        {loading && <span style={{fontSize:11,color:P.amber}}>● Connecting to live feed...</span>}
        {!loading && live && (
          <span style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:P.green,fontWeight:700}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:P.green,display:"inline-block"}}/>
            LIVE — Google News RSS
          </span>
        )}
        {!loading && !live && (
          <span style={{fontSize:11,color:P.muted}}>● Showing cached headlines (live feed unavailable)</span>
        )}
      </div>
      {items.map((n,i)=>(
        <a key={i} href={n.url} target="_blank" rel="noopener noreferrer"
          style={{display:"block",padding:"12px 14px",background:P.bgCard,borderRadius:6,border:`1px solid ${P.border}`,borderLeft:`3px solid ${tagB(n.tag)}`,cursor:"pointer",transition:"background 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.background=P.bgHover}
          onMouseLeave={e=>e.currentTarget.style.background=P.bgCard}>
          <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:P.white,lineHeight:1.5}}>{n.title}</div>
              <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
                <span style={{background:tagC(n.tag)+"18",color:tagC(n.tag),fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:3,border:`1px solid ${tagC(n.tag)}44`}}>{n.tag}</span>
                <span style={{fontSize:11,color:P.muted}}>{n.source}</span>
                <span style={{fontSize:11,color:P.gold,fontWeight:700}}>Read more</span>
              </div>
            </div>
            <div style={{fontSize:10,color:P.muted,flexShrink:0,whiteSpace:"nowrap"}}>{n.date}</div>
          </div>
        </a>
      ))}
    </div>
  );
}

          <button onClick={()=>setActive("worldcup")} style={{width:64,padding:"12px 4px",borderRadius:6,border:"none",cursor:"pointer",background:active==="worldcup"?P.gold+"1A":"transparent",color:active==="worldcup"?P.gold:P.amber,borderLeft:active==="worldcup"?`3px solid ${P.gold}`:"3px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.15s"}}>
            <span style={{fontSize:20}}>🏆</span>
            <span style={{fontSize:7,letterSpacing:"0.1em",fontWeight:800,textAlign:"center",lineHeight:1.4}}>WORLD CUP</span>
          </button>
          <div style={{flex:1}}/>
          <div style={{fontSize:7,color:P.dim,letterSpacing:"0.1em",textAlign:"center",lineHeight:2,padding:"0 6px"}}>TO<br/>DARE<br/>IS<br/>TO<br/>DO</div>
          <div style={{marginTop:8,opacity:0.5}}><SpursLogo size={28}/></div>
        </div>
        <div className="scroll" style={{flex:1,padding:"18px 22px",overflowY:"auto"}}>{panels[active]}</div>
        <div className="scroll" style={{width:320,background:P.bgPanel,borderLeft:`1px solid ${P.border}`,padding:"16px 14px",overflowY:"auto",flexShrink:0}}>
          <RightFeed onNews={()=>setActive("news")}/>
        </div>
      </div>
      <div style={{height:26,background:P.bgPanel,borderTop:`1px solid ${P.border}`,display:"flex",alignItems:"center",padding:"0 16px",gap:16,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,borderRadius:"50%",background:P.green}}/><span style={{fontSize:10,color:P.green,fontWeight:700,letterSpacing:"0.1em"}}>SYSTEM ONLINE</span></div>
        <span style={{fontSize:10,color:P.muted}}>DATA VERIFIED 27 JUN 2026</span>
        <span style={{fontSize:10,color:P.muted}}>SOURCES: PREMIERINJURIES.COM · THFC OFFICIAL · ROMANO · MORETTO · TEAMTALK · ESPN · WIKIPEDIA</span>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,color:P.gold,fontWeight:800,letterSpacing:"0.1em"}}>THFC DASHBOARD v3.0</span>
        <span style={{fontSize:10,color:P.muted}}>COYS</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
