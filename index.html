<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THFC Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{width:100%;height:100%;overflow:hidden;}
body{background:#050D1A;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#C8D8F0;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
.scroll{overflow-y:auto;overflow-x:hidden;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:#CAAB4A55;border-radius:2px;}
@keyframes fillBar{from{width:0;}to{width:var(--w);}}
.bar-fill{animation:fillBar 1.2s ease-out forwards;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes newsFlash{0%,100%{background:#CAAB4A22;border-color:#CAAB4A88;}50%{background:#CAAB4A44;border-color:#CAAB4A;}}
.news-flash{animation:newsFlash 1.5s infinite;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="bundle.js"></script>
</body>
</html>
