.scroll{overflow-y:auto;overflow-x:hidden;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:#CAAB4A55;border-radius:2px;}
@keyframes fillBar{from{width:0;}to{width:var(--w);}}
.bar-fill{animation:fillBar 1.2s ease-out forwards;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.blink{animation:blink 1s infinite;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes newsFlash{0%,100%{background:#CAAB4A22;border-color:#CAAB4A88;}50%{background:#CAAB4A44;border-color:#CAAB4A;}}
.news-flash{animation:newsFlash 1.5s infinite;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:9999;}
</style>

// Responsive breakpoint hook — drives the switch from the 3-column desktop
// shell (nav rail + centre + right feed) to the mobile shell (single panel
// + bottom tab bar) in App.js. Import wherever screen width needs checking.
const MOBILE_BREAKPOINT = 820;
function useIsMobile(){
  const [isMobile, setIsMobile] = useState(
    typeof window !== "undefined" ? window.innerWidth <= MOBILE_BREAKPOINT : false
  );
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= MOBILE_BREAKPOINT);
    onResize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

function Clock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
  const p=n=>String(n).padStart(2,"0");
  return (
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:26,fontWeight:900,color:P.gold,letterSpacing:"0.05em",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>
        {p(t.getHours())}:{p(t.getMinutes())}<span className="blink" style={{color:P.goldDim}}>:</span>{p(t.getSeconds())}
      </div>
      <div style={{fontSize:10,color:P.muted,letterSpacing:"0.15em",marginTop:3,fontWeight:600}}>
        {t.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}).toUpperCase()}
      </div>
    </div>
  );
}

// Next match countdown — big bold version, lives at the top of the right column.
function Countdown(){
  const target=new Date("2026-08-22T15:00:00");
  const [diff,setDiff]=useState(Math.max(0,target-new Date()));
  useEffect(()=>{const i=setInterval(()=>setDiff(Math.max(0,target-new Date())),1000);return()=>clearInterval(i);},[]);
  const p=n=>String(Math.floor(n)).padStart(2,"0");
  const d=diff/86400000,h=(diff%86400000)/3600000,m=(diff%3600000)/60000,s=(diff%60000)/1000;
  return (
    <div style={{background:`linear-gradient(145deg,${P.bgCard},${P.bgPanel})`,border:`2px solid ${P.gold}`,borderRadius:8,padding:"14px 16px",textAlign:"center",boxShadow:`0 0 20px ${P.gold}22`}}>
      <div style={{fontSize:11,color:P.gold,letterSpacing:"0.18em",marginBottom:10,fontWeight:900}}>NEXT MATCH</div>
      <div style={{fontSize:14,color:P.white,fontWeight:800,marginBottom:12}}>BRENTFORD (A) · EPL 26/27</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"baseline"}}>
        {[[p(d),"DAYS"],[p(h),"HRS"],[p(m),"MIN"],[p(s),"SEC"]].map(([v,l])=>(
          <div key={l} style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:34,fontWeight:900,color:P.gold,fontVariantNumeric:"tabular-nums",lineHeight:1,textShadow:`0 0 12px ${P.gold}66`}}>{v}</div>
            <div style={{fontSize:9,color:P.muted,marginTop:4,fontWeight:800,letterSpacing:"0.12em"}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── components/NewsPanel.js ──
// News tab — fetches ALL RSS sources simultaneously on every load.
// No cache. Always fresh. Falls back to hardcoded NEWS if all feeds fail.
// Sources carry breaking news from Romano, Ornstein, O'Keefe, Jacobs, Moretto, Szy
// within 5-30 minutes of their original posts.



function NewsPanel(){
  const [items,setItems]=useState(NEWS);
  const [loading,setLoading]=useState(true);
  const [live,setLive]=useState(false);
  const [liveSource,setLiveSource]=useState('');
  const [showJournalists,setShowJournalists]=useState(false);

  useEffect(()=>{
    let cancelled=false;

    const parseTag=title=>{
      const t=title.toLowerCase();
      if(t.includes('sign')||t.includes('official')||t.includes('done deal')||t.includes('confirmed')) return 'Official';
      if(t.includes('transfer')||t.includes('target')||t.includes('bid')||t.includes('link')||t.includes('deal')||t.includes('fee')||t.includes('million')||t.includes('contract')) return 'Transfer';
      if(t.includes('fixture')||t.includes('kick-off')||t.includes('match')) return 'Fixtures';
      if(t.includes('injury')||t.includes('injured')||t.includes('return')) return 'Injury';
      if(t.includes('says')||t.includes('interview')||t.includes("'")||t.includes('"')) return 'Interview';
      return 'Club';
    };

    const parseFeed=(txt,sourceName)=>{
      const parser=new DOMParser();
      const xml=parser.parseFromString(txt,'text/xml');
      const entries=Array.from(xml.querySelectorAll('item')).slice(0,8);
      return entries.map(e=>{
        const title=(e.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
        const link=e.querySelector('link')?.textContent||'#';
        const pubDate=e.querySelector('pubDate')?.textContent||'';
        const d=pubDate?new Date(pubDate):new Date();
        const dateStr=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
        return {title,source:sourceName,date:dateStr,tag:parseTag(title),url:link,ts:d.getTime()};
      }).filter(i=>i.title.length>10);
    };

    // Try each proxy in sequence for a single source; first success wins.
    const fetchViaProxies=async(src)=>{
      for(const proxy of CORS_PROXIES){
        try{
          const r=await fetch(proxy+encodeURIComponent(src.url),{signal:AbortSignal.timeout(8000)});
          if(!r.ok) continue;
          const txt=await r.text();
          const items=parseFeed(txt,src.name);
          if(items.length>0) return {ok:true,items,name:src.name};
        }catch(e){ /* try next proxy */ }
      }
      return {ok:false,items:[],name:src.name};
    };

    // Fire all sources simultaneously (each internally tries its proxy list)
    const fetches=RSS_SOURCES.map(src=>fetchViaProxies(src));

    Promise.all(fetches).then(results=>{
      if(cancelled) return;
      const allItems=results.flatMap(r=>r.items);
      const sources=results.filter(r=>r.ok&&r.items.length>0).map(r=>r.name);

      if(allItems.length===0){
        // All feeds failed — use fallback
        setItems(NEWS);
        setLive(false);
        setLoading(false);
        return;
      }

      // Deduplicate by title similarity, sort newest first
      const seen=new Set();
      const deduped=allItems
        .sort((a,b)=>b.ts-a.ts)
        .filter(item=>{
          const key=item.title.slice(0,40).toLowerCase();
          if(seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0,20);

      setItems(deduped);
      setLive(true);
      setLiveSource(sources.slice(0,3).join(' · ')+(sources.length>3?' +more':''));
      setLoading(false);
    });

    return ()=>{ cancelled=true; };
  },[]);

  const tagC=t=>t==='Official'?P.gold:t==='Transfer'?P.green:t==='Fixtures'?P.amber:t==='Injury'?P.red:P.muted;
  const tagB=t=>t==='Official'?P.gold:t==='Transfer'?P.green:t==='Fixtures'?P.amber:t==='Injury'?P.red:P.border;

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:10}}>
      <WH lg>News Centre — Live Feed</WH>

      {/* Status bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'8px 12px',background:P.bgCard,borderRadius:6,border:`1px solid ${P.border}`,
        flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {loading&&<span style={{fontSize:11,color:P.amber}}>● Fetching {RSS_SOURCES.length} live sources...</span>}
          {!loading&&live&&(
            <>
              <div style={{width:8,height:8,borderRadius:'50%',background:P.green}}/>
              <span style={{fontSize:11,color:P.green,fontWeight:700}}>LIVE</span>
              <span style={{fontSize:10,color:P.muted}}>via {liveSource}</span>
            </>
          )}
          {!loading&&!live&&(
            <>
              <div style={{width:8,height:8,borderRadius:'50%',background:P.amber}}/>
              <span style={{fontSize:11,color:P.amber,fontWeight:700}}>LIVE FETCH UNAVAILABLE — showing this morning's headlines</span>
            </>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:10,color:P.muted}}>Refreshes on every load · Tap headline to read</span>
          <button onClick={()=>setShowJournalists(v=>!v)} style={{
            background:P.gold+'18',border:`1px solid ${P.gold}44`,borderRadius:4,
            padding:'3px 10px',fontSize:10,fontWeight:700,color:P.gold,cursor:'pointer'}}>
            {showJournalists?'HIDE':'SOURCES'}
          </button>
        </div>
      </div>

      {/* Journalists panel */}
      {showJournalists&&(
        <div style={{padding:'12px 14px',background:P.bgCard,borderRadius:6,
          border:`1px solid ${P.purple}44`,borderLeft:`3px solid ${P.purple}`}}>
          <div style={{fontSize:11,color:P.gold,fontWeight:900,letterSpacing:'0.12em',marginBottom:10}}>
            MONITORED JOURNALISTS
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:6}}>
            {JOURNALISTS.map((j,i)=>(
              <div key={i} style={{padding:'8px 10px',background:P.bgPanel,borderRadius:4,
                border:`1px solid ${P.border}`}}>
                <div style={{fontSize:12,fontWeight:800,color:P.white}}>{j.name}
                  <span style={{fontSize:10,color:P.gold,marginLeft:6}}>{j.handle}</span>
                </div>
                <div style={{fontSize:10,color:P.muted,marginTop:2}}>{j.beat}</div>
                <div style={{fontSize:9,color:P.purple,marginTop:2}}>{j.platform}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,fontSize:10,color:P.muted,lineHeight:1.7}}>
            Breaking news from these journalists reaches the live RSS feeds above within
            <strong style={{color:P.gold}}> 5–30 minutes</strong> of their original posts on X.
          </div>
        </div>
      )}

      {/* News items */}
      {items.map((n,i)=>(
        <a key={i} href={n.url} target="_blank" rel="noopener noreferrer"
          style={{display:'block',padding:'12px 14px',background:P.bgCard,borderRadius:6,
            border:`1px solid ${P.border}`,borderLeft:`3px solid ${tagB(n.tag)}`,
            cursor:'pointer',transition:'background 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.background=P.bgHover}
          onMouseLeave={e=>e.currentTarget.style.background=P.bgCard}>
          <div style={{display:'flex',justifyContent:'space-between',gap:12,alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:P.white,lineHeight:1.5}}>{n.title}</div>
              <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{background:tagC(n.tag)+'18',color:tagC(n.tag),fontSize:10,
                  fontWeight:700,padding:'2px 7px',borderRadius:3,
                  border:`1px solid ${tagC(n.tag)}44`}}>{n.tag}</span>
                <span style={{fontSize:11,color:P.muted}}>{n.source}</span>
                <span style={{fontSize:11,color:P.gold,fontWeight:700}}>↗ Read</span>
              </div>
            </div>
            <div style={{fontSize:10,color:P.muted,flexShrink:0,whiteSpace:'nowrap'}}>{n.date}</div>
          </div>
        </a>
      ))}
    </div>
  );
}

    <div key={i} style={{borderRadius:6,overflow:"hidden",marginBottom:8,border:`1px solid ${p.out?P.red+"44":P.gold+"44"}`,background:P.bgCard}}>
      <div style={{padding:"12px 14px",cursor:"pointer"}} onClick={()=>setExp(exp===i?null:i)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
              <span style={{fontSize:22}}>{p.e}</span>
              <span style={{fontSize:15,fontWeight:900,color:P.white}}>{p.name}</span>
              <Chip label={p.pos} color={P.cyan}/>
              <Chip label={p.out?"ELIMINATED":"IN TOURNAMENT"} color={p.out?P.red:P.green}/>
            </div>
            <div style={{fontSize:11,color:P.muted,marginBottom:6}}>{p.country} · Group {p.group} · {p.progress}</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {p.results.map((r,j)=><span key={j} style={{fontSize:11,padding:"3px 8px",background:rc(r)+"22",border:`1px solid ${rc(r)}55`,borderRadius:3,color:rc(r),fontWeight:700}}>{r}</span>)}
            </div>
          </div>
          <div style={{textAlign:"center",flexShrink:0,minWidth:60}}>
            <div style={{fontSize:30,fontWeight:900,lineHeight:1,color:rtgC(p.rtg)}}>{p.rtg}</div>
            <div style={{fontSize:9,color:P.muted,fontWeight:700,letterSpacing:"0.1em",marginTop:2}}>AVG RTG</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,padding:"10px",background:P.bgPanel,borderRadius:5}}>
          {[["GP",p.gp,P.white],["XI",p.xi,P.green],["SUB",p.sub,P.amber],["BENCH",p.bench,P.muted],["GOALS",p.goals,P.gold],["ASST",p.ast,P.cyan],["RTG",p.rtg,rtgC(p.rtg)]].map(([l,v,c],j)=>(
            <div key={j} style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
              <div style={{fontSize:9,color:P.muted,fontWeight:700,letterSpacing:"0.08em",marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,fontSize:10,color:P.muted}}>{exp===i?"▲ Collapse":"▾ Tap for match notes"}</div>
      </div>
      {exp===i&&<div style={{padding:"0 14px 12px",borderTop:`1px solid ${P.border}`}}><div style={{paddingTop:10,fontSize:13,color:P.text,lineHeight:1.8}}>{p.note}</div><div style={{marginTop:8,fontSize:12,fontWeight:700,color:p.out?P.red:P.green}}>{p.progress}</div></div>}
    </div>
  );

  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16}}>
      <WH lg>2026 FIFA World Cup — Spurs Players</WH>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[[active.length,"STILL IN",P.green],[out.length,"ELIMINATED",P.red],[WC.reduce((a,p)=>a+p.goals,0),"TOTAL GOALS",P.gold],[WC.reduce((a,p)=>a+p.ast,0),"TOTAL ASSISTS",P.cyan]].map(([v,l,c],i)=>(
          <div key={i} style={{padding:"14px",background:P.bgCard,borderRadius:6,border:`1px solid ${P.border}`,borderTop:`3px solid ${c}`,textAlign:"center"}}>
            <div style={{fontSize:34,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:11,color:P.muted,fontWeight:700,letterSpacing:"0.12em",marginTop:5}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{padding:"8px 14px",background:P.bgCard,borderRadius:5,border:`1px solid ${P.borderGold}`,fontSize:11,color:P.muted,lineHeight:1.7}}>
        <span style={{color:P.gold,fontWeight:800}}>COLUMN GUIDE:</span> GP = Games Played · XI = Started First Eleven · SUB = Came on as substitute · BENCH = Unused sub · GOALS · ASST = Assists · RTG = Avg match rating (Sofascore-style 1-10)
      </div>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:P.green}}/>
          <span style={{fontSize:15,fontWeight:900,color:P.green,letterSpacing:"0.12em"}}>STILL IN TOURNAMENT ({active.length})</span>
        </div>
        {active.map((p,i)=>Card(p,i))}
      </div>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:P.red}}/>
          <span style={{fontSize:15,fontWeight:900,color:P.red,letterSpacing:"0.12em"}}>ELIMINATED ({out.length})</span>
        </div>
        {out.map((p,i)=>Card(p,active.length+i))}
      </div>
      <div style={{padding:"10px 14px",background:P.bgCard,borderRadius:5,border:`1px solid ${P.borderGold}`,fontSize:11,color:P.muted,lineHeight:1.7}}>
        <span style={{color:P.gold,fontWeight:800}}>DATA:</span> Group stage complete 27 Jun 2026. Stats from ESPN, Wikipedia, FourFourTwo and FOXSports. Ratings estimated from match reports. <span style={{color:P.amber}}>Round of 32 started Jun 28 — update data as results come in.</span>
      </div>
    </div>
  );
}

// ── components/RightFeed.js ──
// Right column feed — countdown, transfer alerts, daily whispers, headlines button, injury alerts.
// Edit ONLY this file to change the right sidebar widgets or their order.





function RightFeed({onNews}){
  const stC=s=>s==='hot'?P.green:s==='warm'?P.amber:P.muted;
  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>

      {/* 1. COUNTDOWN */}
      <Countdown/>

      {/* 2. TRANSFER ALERTS */}
      <div style={{background:P.transferBg,border:`1px solid ${P.transferBorder}44`,
        borderRadius:6,padding:'12px'}}>
        <WH>Transfer Alerts</WH>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {/* Latest confirmed signing — dynamic, always reflects newest CONFIRMED entry */}
          {CONFIRMED.length>0&&(()=>{const c=CONFIRMED[0];return(
            <div style={{padding:'9px 10px',background:P.bgCard,borderRadius:4,
              border:`1px solid ${P.green}55`,borderLeft:`3px solid ${P.green}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:800,color:P.white}}>{c.e} {c.player}</span>
                <span style={{fontSize:10,background:P.green,color:P.bg,padding:'2px 6px',
                  borderRadius:3,fontWeight:900}}>DONE ✓</span>
              </div>
              <div style={{fontSize:11,color:P.green,fontWeight:700}}>£{c.fee} — {c.from}</div>
              <div style={{fontSize:10,color:P.muted,marginTop:2}}>{c.role!=='TBC'?c.role+' · ':''}{c.date}</div>
            </div>
          );})()}
          {TRANSFER_BRIEFS.slice(0,4).map((r,i)=>(
            <div key={i} style={{padding:'9px 10px',background:P.bgCard,borderRadius:4,
              border:`1px solid ${stC(r.st)}33`,borderLeft:`3px solid ${stC(r.st)}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:800,color:P.white}}>{r.e} {r.player}</span>
                <span style={{fontSize:18,fontWeight:900,color:stC(r.st)}}>{r.like}%</span>
              </div>
              <div style={{fontSize:11,color:P.muted,marginBottom:4}}>from {r.from} · £{r.fee}</div>
              <Bar pct={r.like} color={stC(r.st)}/>
            </div>
          ))}
        </div>
      </div>

      {/* 3. DAILY WHISPERS */}
      <div style={{background:P.bgCard,border:`1px solid ${P.purple}44`,
        borderRadius:6,padding:'12px'}}>
        <WH>Daily Whispers</WH>
        <div style={{fontSize:10,color:P.muted,marginBottom:8,fontStyle:'italic'}}>
          Anonymous club intel — no names · updated daily
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {ANON_BRIEFS.map((b,i)=>(
            <div key={i} style={{padding:'9px 10px',background:P.bgPanel,borderRadius:4,
              border:`1px solid ${P.purple}33`,borderLeft:`3px solid ${P.purple}`}}>
              <div style={{fontSize:11,color:P.text,lineHeight:1.6}}>{b.text}</div>
              <div style={{fontSize:9,color:P.muted,marginTop:5}}>{b.date}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 4. LATEST HEADLINES BUTTON */}
      <button className="news-flash" onClick={onNews} style={{padding:'12px 14px',borderRadius:6,
        border:`1px solid ${P.gold}`,background:P.goldGlow,cursor:'pointer',
        textAlign:'left',width:'100%'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,fontWeight:900,color:P.gold,letterSpacing:'0.12em'}}>
            LATEST HEADLINES
          </span>
          <span style={{fontSize:10,background:P.red,color:P.white,padding:'2px 8px',
            borderRadius:3,fontWeight:800,letterSpacing:'0.1em'}}>LIVE</span>
        </div>
        <div style={{fontSize:11,color:P.muted,marginTop:4}}>
          {NEWS.length}+ articles · Fetched fresh every load · Last: {now}
        </div>
      </button>

      {/* 5. INJURY ALERTS */}
      <div style={{background:P.injuryBg,border:`1px solid ${P.injuryBorder}55`,
        borderRadius:6,padding:'12px'}}>
        <WH>Injury Alerts</WH>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {INJURIES.map((inj,i)=>(
            <div key={i} style={{padding:'8px 10px',background:'#120800',borderRadius:4,
              border:`1px solid ${P.border}`,
              borderLeft:`3px solid ${inj.sev==='long'?P.red:P.amber}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,fontWeight:700,color:P.white}}>
                  {inj.emoji} {inj.name}
                </span>
                <span style={{fontSize:11,fontWeight:800,
                  color:inj.sev==='long'?P.red:P.amber}}>{inj.ret}</span>
              </div>
              <div style={{fontSize:11,color:'#FFD080',marginTop:2}}>{inj.issue}</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

// ── components/App.js ──
// App shell — top bar, left nav rail, panel router, status bar.
// Edit ONLY this file to change layout structure, nav order, or top/bottom bars.










// Nav order — edit this array to reorder or rename tabs.
const NAV = [
  {id:"overview",  icon:"◈", label:"OVERVIEW"},
  {id:"squad",     icon:"▦", label:"SQUAD"},
  {id:"injuries",  icon:"✚", label:"INJURIES"},
  {id:"transfers", icon:"⇄", label:"TRANSFERS"},
  {id:"records",   icon:"★", label:"RECORDS"},
];

// Mobile bottom tab bar — same tabs as the desktop nav rail, plus the
// World Cup shortcut and a dedicated FEED tab (news/transfers/whispers,
// which live in the right sidebar on desktop but need their own tab here).
const NAV_MOBILE = [
  ...NAV,
  {id:"worldcup", icon:"🏆", label:"CUP"},
  {id:"feed",     icon:"📰", label:"FEED"},
];

function App(){
  const [active,setActive]=useState("overview");
  const isMobile = useIsMobile();
  const panels={
    overview:<OverviewPanel/>, squad:<SquadPanel/>, injuries:<InjuriesPanel/>,
    transfers:<TransfersPanel/>, records:<RecordsPanel/>, news:<NewsPanel/>,
    worldcup:<WorldCupPanel/>,
    // "feed" isn't a real panel — on mobile it reuses the same RightFeed
    // widget that sits in the desktop sidebar, shown full-screen instead.
    feed:<RightFeed onNews={()=>setActive("news")}/>,
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:P.bg,overflow:"hidden"}}>

      {/* TOP BAR — logo/name on left, clock on right */}
      <div style={{background:`linear-gradient(90deg,${P.bgPanel},#0A1530)`,borderBottom:`1px solid ${P.borderGold}`,display:"flex",alignItems:"stretch",padding:isMobile?"0 12px":"0 16px",gap:16,flexShrink:0,minHeight:isMobile?60:80,WebkitAppRegion:"drag"}}>
        <div style={{display:"flex",alignItems:"center",gap:isMobile?8:14,paddingRight:isMobile?12:20,borderRight:`1px solid ${P.border}`}}>
          <div style={{filter:`drop-shadow(0 0 12px ${P.gold}66)`}}><SpursLogo size={isMobile?36:58}/></div>
          <div>
            <div style={{fontSize:isMobile?14:20,fontWeight:900,letterSpacing:"0.1em",background:`linear-gradient(90deg,${P.white},${P.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>TOTTENHAM HOTSPUR</div>
            {!isMobile && <div style={{fontSize:10,color:P.muted,letterSpacing:"0.22em",fontWeight:700,marginTop:4}}>AUDERE EST FACERE · SEASON HUB</div>}
          </div>
        </div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",alignItems:"center",paddingLeft:isMobile?12:20,borderLeft:`1px solid ${P.border}`}}>
          <Clock/>
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* LEFT NAV RAIL — desktop only; mobile uses the bottom tab bar instead */}
        {!isMobile && (
          <div style={{width:78,background:P.bgPanel,borderRight:`1px solid ${P.border}`,display:"flex",flexDirection:"column",alignItems:"center",padding:"14px 0",gap:2,flexShrink:0}}>
            {NAV.map(item=>(
              <button key={item.id} onClick={()=>setActive(item.id)} style={{width:64,padding:"12px 4px",borderRadius:6,border:"none",cursor:"pointer",background:active===item.id?P.gold+"1A":"transparent",color:active===item.id?P.gold:P.muted,borderLeft:active===item.id?`3px solid ${P.gold}`:"3px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:4,boxShadow:active===item.id?`0 0 12px ${P.gold}33`:"none",transition:"all 0.15s"}}>
                <span style={{fontSize:18}}>{item.icon}</span>
                <span style={{fontSize:7,letterSpacing:"0.12em",fontWeight:800}}>{item.label}</span>
              </button>
            ))}
            <div style={{width:40,height:1,background:P.border,margin:"10px 0"}}/>
            {/* World Cup — separate, once-every-4-years special button */}
            <button onClick={()=>setActive("worldcup")} style={{width:64,padding:"12px 4px",borderRadius:6,border:"none",cursor:"pointer",background:active==="worldcup"?P.gold+"1A":"transparent",color:active==="worldcup"?P.gold:P.amber,borderLeft:active==="worldcup"?`3px solid ${P.gold}`:"3px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.15s"}}>
              <span style={{fontSize:20}}>🏆</span>
              <span style={{fontSize:7,letterSpacing:"0.1em",fontWeight:800,textAlign:"center",lineHeight:1.4}}>WORLD CUP</span>
            </button>
            <div style={{flex:1}}/>
            <div style={{fontSize:7,color:P.dim,letterSpacing:"0.1em",textAlign:"center",lineHeight:2,padding:"0 6px"}}>TO<br/>DARE<br/>IS<br/>TO<br/>DO</div>
            <div style={{marginTop:8,opacity:0.5}}><SpursLogo size={28}/></div>
          </div>
        )}

        {/* CENTRE PANEL — full width on mobile; on desktop shares the row with the rail + feed */}
        <div className="scroll" style={{flex:1,padding:isMobile?"14px 14px":"18px 22px",overflowY:"auto"}}>{panels[active]}</div>

        {/* RIGHT FEED — desktop only; mobile reaches the same content via the FEED tab below */}
        {!isMobile && (
          <div className="scroll" style={{width:320,background:P.bgPanel,borderLeft:`1px solid ${P.border}`,padding:"16px 14px",overflowY:"auto",flexShrink:0}}>
            <RightFeed onNews={()=>setActive("news")}/>
          </div>
        )}
      </div>

      {/* STATUS BAR (desktop) / BOTTOM TAB BAR (mobile) */}
      {isMobile ? (
        <div className="scroll" style={{display:"flex",overflowX:"auto",background:P.bgPanel,borderTop:`1px solid ${P.border}`,flexShrink:0,padding:"6px 4px",gap:2}}>
          {NAV_MOBILE.map(item=>(
            <button key={item.id} onClick={()=>setActive(item.id)} style={{flex:"1 0 auto",minWidth:52,padding:"6px 2px",borderRadius:6,border:"none",cursor:"pointer",background:active===item.id?P.gold+"1A":"transparent",color:active===item.id?P.gold:P.muted,borderTop:active===item.id?`2px solid ${P.gold}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all 0.15s"}}>
              <span style={{fontSize:16}}>{item.icon}</span>
              <span style={{fontSize:8,letterSpacing:"0.06em",fontWeight:800}}>{item.label}</span>
            </button>
          ))}
        </div>
      ) : (
        <div style={{height:26,background:P.bgPanel,borderTop:`1px solid ${P.border}`,display:"flex",alignItems:"center",padding:"0 16px",gap:16,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:7,height:7,borderRadius:"50%",background:P.green}}/><span style={{fontSize:10,color:P.green,fontWeight:700,letterSpacing:"0.1em"}}>SYSTEM ONLINE</span></div>
          <span style={{fontSize:10,color:P.muted}}>DATA VERIFIED {BUILD_DATE}</span>
          <span style={{fontSize:10,color:P.muted}}>SOURCES: PREMIERINJURIES.COM · THFC OFFICIAL · ROMANO · MORETTO · TEAMTALK · ESPN · WIKIPEDIA</span>
          <div style={{flex:1}}/>
          <span style={{fontSize:10,color:P.gold,fontWeight:800,letterSpacing:"0.1em"}}>THFC DASHBOARD v4.0 — MODULAR</span>
          <span style={{fontSize:10,color:P.muted}}>COYS</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
