{E0065}\u{E006E}\u{E0067}\u{E007F}",apps:19,g:5,con:"2030",wc:null,st:"HAMSTRING",sc:"amber"},{name:"Richarlison",pos:"ST",e:"\u{1F1E7}\u{1F1F7}",apps:24,g:8,con:"2027",wc:null,st:"SALE EXPECTED",sc:"amber"},{name:"W. Odobert",pos:"LW",e:"\u{1F1EB}\u{1F1F7}",apps:20,g:2,con:"2029",wc:null,st:"ACL \u2014 NOV 2026",sc:"red"}],INJURIES=[{name:"Xavi Simons",flag:"NL",emoji:"\u{1F1F3}\u{1F1F1}",pos:"CM",issue:"ACL right knee",sev:"long",ret:"20 Feb 2027"},{name:"Wilson Odobert",flag:"FR",emoji:"\u{1F1EB}\u{1F1F7}",pos:"LW",issue:"ACL left knee",sev:"long",ret:"28 Nov 2026"},{name:"Dejan Kulusevski",flag:"SE",emoji:"\u{1F1F8}\u{1F1EA}",pos:"RW",issue:"Knee (patella/cartilage) \u2014 has not played a competitive match since May 2025. Missed the entire 2025/26 season and was left out of Sweden's 2026 World Cup squad. Multiple surgeries; club and national team doctors remain cautiously optimistic he returns for 2026/27.",sev:"long",ret:"TARGETING 2026/27 SEASON \u2014 no confirmed date"},{name:"Mohammed Kudus",flag:"GH",emoji:"\u{1F1EC}\u{1F1ED}",pos:"FW",issue:"Thigh \u2014 possible surgery",sev:"medium",ret:"29 Jun 2026"}],TRANSFER_BRIEFS=[{player:"Savinho",e:"\u{1F1E7}\u{1F1F7}",from:"Man City",fee:"45-60m",like:55,st:"warm",date:"7 Jul",brief:"Romano confirms talks are active and City are weighing whether to sell \u2014 personal terms reportedly already agreed on a 5-year deal (~\xA36m/yr). But as of 5 Jul, Spurs have paused the move while the club decides internally which left-wing option to prioritise: Savinho, Rafael Leao, Marcus Rashford, or Eli Junior Kroupi. Leao has since overtaken him as the more advanced pursuit. Arsenal have also tried to hijack with a loan offer."},{player:"Carlos Baleba",e:"\u{1F1E8}\u{1F1F2}",from:"Brighton",fee:"45m",like:45,st:"warm",date:"20 Jun",brief:"Manager worked with Baleba at Brighton. Wants reunion at N17. Fee could be negotiated down given relationship. Third midfield target behind Fernandes and Tonali."},{player:"Bart Verbruggen",e:"\u{1F1F3}\u{1F1F1}",from:"Brighton",fee:"30m",like:45,st:"warm",date:"20 Jun",brief:"Dubravka signing seen as short-term only. Still want a top-level GK. Manager's previous No.1 at Brighton. Vicario sale expected to fund this move."},{player:"Cody Gakpo",e:"\u{1F1F3}\u{1F1F1}",from:"Liverpool",fee:"60m+",like:15,st:"cold",date:"25 Jun",brief:"Identified as attacking option internally. Liverpool open to selling but have raised valuation to 60m+. Any deal likely delayed until World Cup ends. Netherlands in R32 vs Morocco."},{player:"Eli Junior Kroupi",e:"\u{1F1EB}\u{1F1F7}",from:"Bournemouth",fee:"80-86m",like:45,st:"warm",date:"8 Jul",brief:"Spurs held direct talks with Kroupi's camp on 2-3 Jul and he's reported to be excited about the move under De Zerbi. But Bournemouth's public stance has hardened \u2014 Sky Sports sources (Michael Bridge, Mark McAdam) say a sale is 'highly unlikely' this summer, with owner Bill Foley wanting a strong squad for Marco Rose's first season and no financial pressure to sell. Contracted to 2030, no release clause. Fee reports range \xA380-86m/\u20AC100m. Arsenal and PSG also interested."},{player:"Rafael Leao",e:"\u{1F1F5}\u{1F1F9}",from:"AC Milan",fee:"60m",like:65,st:"hot",date:"9 Jul",brief:"Significantly advanced since early July. Leao has reportedly told Tottenham he's ready to say yes and is willing to accept even without Champions League football next season \u2014 a major boost given rival interest. Agent Jorge Mendes is actively working the deal. Romano confirms Milan and Leao have agreed a summer exit is best for both sides; Milan's valuation is around \u20AC60m/\xA351m. Man Utd have reportedly passed on hijacking the move (Carrick doesn't see him as a priority), leaving Spurs with a relatively clear run \u2014 though Saudi Pro League clubs are also circling."}],CONFIRMED=[{player:"Sandro Tonali",e:"\u{1F1EE}\u{1F1F9}",from:"Newcastle",fee:"100m",role:"TBC",date:"2026-07-03",note:"Confirmed by BBC, Sky Sports, football.london and Romano. Tonali photographed boarding flight to complete transfer. 6-year deal reported. De Zerbi connection central to move. Role confirmed as DM (his primary position at Milan/Newcastle) \u2014 added to squad."},{player:"Mateus Fernandes",e:"\u{1F1F5}\u{1F1F9}",from:"West Ham",fee:"85m",role:"CM",date:"1 Jul 2026",note:"CLUB RECORD. Romano + Ornstein confirmed. Medical underway. Beats Man Utd to signing."},{player:"JP van Hecke",e:"\u{1F1F3}\u{1F1F1}",from:"Brighton",fee:"52m",role:"CB",date:"Jun 2026",note:"5-yr deal. De Zerbi reunion. At WC with Netherlands."},{player:"A. Robertson",e:"\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}",from:"Liverpool",fee:"Free",role:"LB",date:"Jun 2026",note:"Experience and cover at LB."},{player:"M. Senesi",e:"\u{1F1E6}\u{1F1F7}",from:"Bournemouth",fee:"Free",role:"CB",date:"Jun 2026",note:"AFC Bournemouth's Players' Player of the Year. 4-yr deal."},{player:"M. Dubravka",e:"\u{1F1F8}\u{1F1F0}",from:"Burnley",fee:"Free",role:"GK",date:"24 Jun 2026",note:"Joins Jul 1. Backup to Kinsky. 60 Slovakia caps."}],DEPARTURES=[{player:"J. Palhinha",note:"Palhinha has posted a heartfelt public farewell message to Tottenham fans, confirming his departure per football.london and Cartilage Free Captain. Contract expired Jun 30 \u2014 departure now effectively self-confirmed by the player."},{player:"Luka Vuskovic",note:"Sale to Brighton agreed \u2014 \xA346m (BBC), with a significant sell-on clause. 19-year-old Croatian CB had never made a senior Spurs appearance."},{player:"Y. Bissouma",note:"Released \u2014 contract expired Jun 30 (Official)"},{player:"A. Veliz",note:"SOLD \u2014 Bahia \xA37.8m + add-ons + 20% sell-on. Effective 1 Jul 2026 (Official)"},{player:"Kolo Muani",note:"Loan ended \u2014 returned to PSG"},{player:"G. Vicario",note:"Sale expected \u2014 Juve & Napoli interested (Romano)"},{player:"J. Palhinha",note:"Contract expired Jun 30 \u2014 future uncertain"},{player:"R. Bentancur",note:"Contract expired Jun 30 \u2014 at WC with Uruguay"}],ANON_BRIEFS=[{date:"9 Jul",text:"Word inside the building is that the mood has shifted decisively toward Leao over the last few days. Savinho was the long-standing priority, but sources close to the recruitment team say the player's willingness to accept a move without Champions League football \u2014 something Savinho's camp were said to be less relaxed about \u2014 tipped the internal debate. Kroupi is increasingly viewed as a 2027 target rather than this summer, given Bournemouth's refusal to engage."},{date:"4 Jul",text:"Whispers from inside Hotspur Way suggest Bergvall's situation is more complicated than the official line. The club told him firmly he won't be sold \u2014 but De Zerbi is said to have privately acknowledged the player's discontent is genuine. Whether that quiet understanding leads anywhere before the window closes is a question nobody inside N17 is answering directly."},{date:"4 Jul",text:"Vicario's camp are playing hardball. The goalkeeper is understood to be pushing for guarantees over his next destination before greenlighting any exit \u2014 Juventus are keen but the player hasn't committed. The training ground view is that this one drags into August."},{date:"1 Jul",text:"The mood inside the training ground following the Fernandes agreement is described as genuinely electric. De Zerbi has been hands-on in every negotiation this summer \u2014 a stark contrast to previous regimes."},{date:"30 Jun",text:"Word from N17 is that Tonali has been told by his own representatives to be patient \u2014 Spurs are not walking away. The club view the Fernandes deal as proof they can now compete for any target."},{date:"28 Jun",text:"Sources suggest Bergvall's exit is being treated internally as a blessing \u2014 De Zerbi was always planning to reshape the midfield and the transfer fee received will help fund the Tonali pursuit."},{date:"25 Jun",text:"Background chatter suggests Vicario exit could be finalised within d
