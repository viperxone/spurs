function Tag({ label, color }) {
  return (
    <span style={{ background:color||C.navyLight, color:C.white, fontSize:9, fontWeight:700,
      letterSpacing:"0.08em", padding:"2px 7px", borderRadius:3, textTransform:"uppercase",
      whiteSpace:"nowrap" }}>{label}</span>
  );
}

function Card({ children, style }) {
  return (
    <div style={{ background:`linear-gradient(145deg,${C.navyLight},${C.navyMid})`,
      borderRadius:12, padding:20, border:`1px solid rgba(202,171,74,0.18)`, ...style }}>
      {children}
    </div>
  );
}

function SecTitle({ icon, children }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
      {icon && <span style={{ fontSize:16 }}>{icon}</span>}
      <span style={{ fontSize:11, fontWeight:900, letterSpacing:"0.14em",
        textTransform:"uppercase", color:C.gold }}>{children}</span>
      <div style={{ flex:1, height:1, background:`linear-gradient(to right,${C.gold}55,transparent)` }}/>
    </div>
  );
}

function ResultBadge({ r }) {
  const col = r==="W" ? C.green : r==="D" ? C.amber : C.red;
  return (
    <div style={{ width:24,height:24,borderRadius:"50%",background:col,display:"flex",
      alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,
      color:C.white,flexShrink:0 }}>{r}</div>
  );
}

const posCol = pos =>
  pos==="GK" ? "#6C3483" :
  ["CB","RB","LB"].includes(pos) ? C.navyMid :
  ["DM","CM","AM"].includes(pos) ? C.green : "#8B4513";

const statusColor = st =>
  st.startsWith("вњ…") ? C.greenL :
  st.startsWith("рџ”ґ") ? C.red :
  st.startsWith("рџџЎ") ? C.amber :
  st.startsWith("вљ пёЏ") ? "#E8A020" : C.muted;

const tagColor = tag =>
  tag==="Official" ? C.goldDim :
  tag==="Transfer" ? C.green :
  tag==="Fixtures" ? C.amber : C.navyMid;

const tagBorder = tag =>
  tag==="Official" ? C.gold :
  tag==="Transfer" ? C.greenL :

          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <Card>
              <SecTitle icon="вњ…">Confirmed Signings вЂ” Summer 2026</SecTitle>
              <div style={{ display:"grid",
                gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:10 }}>
                {CONFIRMED_SIGNINGS.map((s, i) => (
                  <div key={i} style={{ padding:"14px 16px",
                    background:"rgba(30,123,75,0.12)", borderRadius:10,
                    border:`1px solid ${C.green}44` }}>
                    <div style={{ display:"flex", justifyContent:"space-between",
                      alignItems:"flex-start" }}>
                      <div>
                        <div style={{ fontSize:14, fontWeight:800 }}>{s.nat} {s.player}</div>
                        <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>From: {s.from}</div>
                        <div style={{ fontSize:10, color:C.muted, marginTop:1 }}>{s.note}</div>
                        <div style={{ display:"flex", gap:6, marginTop:8 }}>
                          <Tag label={s.role} color={C.navyMid}/>
                          <Tag label="вњ… Done" color={C.green}/>
                        </div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:14, fontWeight:900, color:C.gold }}>{s.fee}</div>
                        <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>{s.date}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            <Card>
              <SecTitle icon="рџљЄ">Departures</SecTitle>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {DEPARTURES.map((d, i) => (
                  <div key={i} style={{ padding:"10px 14px",
                    background:"rgba(192,57,43,0.08)", borderRadius:8,
                    display:"flex", justifyContent:"space-between",
                    alignItems:"center", gap:10,
                    borderLeft:`3px solid ${C.red}` }}>
                    <div style={{ fontSize:13, fontWeight:700 }}>{d.player}</div>
                    <div style={{ fontSize:10, color:C.red, textAlign:"right",
                      flexShrink:0, maxWidth:"55%" }}>{d.note}</div>
                  </div>
                ))}
              </div>
            </Card>

            <Card>
              <SecTitle icon="рџ”„">Transfer Rumours вЂ” Command Centre</SecTitle>
              <div style={{ fontSize:10, color:C.muted, marginBottom:12 }}>
                Sources: Romano В· Moretto В· TEAMtalk В· Sky Sports В· Football Insider вЂ” updated 27 Jun 2026
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {TRANSFER_RUMOURS.map((r, i) => (
                  <div key={i} style={{ borderRadius:10, overflow:"hidden",
                    border:`1px solid ${statusCol(r.status)}44`,
                    background:"rgba(255,255,255,0.03)" }}>
                    <div style={{ padding:"14px 16px", cursor:"pointer" }}
                      onClick={() => setExpandedR(expandedR===i ? null : i)}>
                      <div style={{ display:"flex", justifyContent:"space-between",
                        alignItems:"flex-start" }}>
                        <div>
                          <div style={{ display:"flex", alignItems:"center",
                            gap:8, flexWrap:"wrap" }}>
                            <span style={{ fontSize:16 }}>{r.nat}</span>
                            <span style={{ fontSize:15, fontWeight:800 }}>{r.player}</span>
                            <Tag label={r.status==="hot"?"рџ”Ґ Hot":r.status==="warm"?"в™ЁпёЏ Warm":"вќ„пёЏ Cold"}
                              color={r.status==="hot"?C.green:r.status==="warm"?"#7D5A00":"#2C3E50"}/>
                          </div>
                          <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>
                            From: <span style={{ color:C.white }}>{r.from}</span>
                            {" В· "}Fee: <span style={{ color:C.gold, fontWeight:700 }}>{r.fee}</span>
                          </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ fontSize:10, color:C.muted }}>{r.source}</div>
                          <div style={{ fontSize:9, color:C.muted }}>{r.date}</div>
                        </div>
                      </div>
                      {/* Likelihood bar */}
                      <div style={{ marginTop:10 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                          <span style={{ fontSize:9, color:C.muted }}>LIKELIHOOD</span>
                          <span style={{ fontSize:10, fontWeight:800,
                            color:statusCol(r.status) }}>{r.likelihood}%</span>
                        </div>
                        <div style={{ background:"rgba(255,255,255,0.07)", borderRadius:99, height:4 }}>
                          <div style={{ width:`${r.likelihood}%`, height:4, borderRadius:99,
                            background:statusCol(r.status) }}/>
                        </div>
                      </div>
                      <div style={{ marginTop:5, fontSize:9, color:C.muted }}>
                        {expandedR===i ? "в–І Collapse" : "в–ѕ Tap for detail"}
                      </div>
                    </div>
                    {expandedR===i && (
                      <div style={{ padding:"0 16px 14px",
                        borderTop:"1px solid rgba(255,255,255,0.06)" }}>
                        <div style={{ paddingTop:10, fontSize:12, color:C.off,
                          lineHeight:1.7 }}>{r.detail}</div>
                        <div style={{ marginTop:6, fontSize:9, color:C.gold }}>
                          via {r.source}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* в•ђв•ђ NEWS в•ђв•ђ */}
        {tab==="news" && (
          <Card>
            <SecTitle icon="рџ“°">News Centre вЂ” Newest First</SecTitle>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {NEWS.map((n, i) => (
                <div key={i} style={{ padding:"13px 16px",
                  background:"rgba(255,255,255,0.04)", borderRadius:10,
                  borderLeft:`3px solid ${tagBorder(n.tag)}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", gap:12 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12, fontWeight:700, lineHeight:1.5 }}>{n.title}</div>
                      <div style={{ display:"flex", gap:8, marginTop:7,
                        alignItems:"center", flexWrap:"wrap" }}>
                        <Tag label={n.tag} color={tagColor(n.tag)}/>
                        <span style={{ fontSize:10, color:C.muted }}>{n.source}</span>
                      </div>
                    </div>
                    <div style={{ fontSize:9, color:C.muted, flexShrink:0,
                      marginTop:2, textAlign:"right", minWidth:60 }}>{n.date}</div>
                  </div>
                </div>
              ))}
            </div>
          </Card>
        )}
      </div>

      {/* в”Ђв”Ђ FOOTER в”Ђв”Ђ */}
      <div style={{ textAlign:"center", padding:"16px",
        borderTop:`1px solid rgba(202,171,74,0.12)`,
        fontSize:9, color:C.muted, letterSpacing:"0.1em",
        display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
        <SpursLogo size={18}/>
        AUDERE EST FACERE В· THFC 1882 В· DATA VERIFIED 27 JUN 2026 В· COYS рџђ“
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
