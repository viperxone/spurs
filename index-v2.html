function Tag({label,color}){
  return <span style={{background:color||C.navyLight,color:C.white,fontSize:9,fontWeight:700,
    letterSpacing:"0.08em",padding:"2px 7px",borderRadius:3,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>;
}

function Card({children,style}){
  return <div style={{background:`linear-gradient(145deg,${C.navyLight},${C.navyMid})`,
    borderRadius:12,padding:20,border:`1px solid rgba(202,171,74,0.18)`,...style}}>{children}</div>;
}

function SecTitle({icon,children}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      {icon&&<span style={{fontSize:16}}>{icon}</span>}
      <span style={{fontSize:11,fontWeight:900,letterSpacing:"0.14em",textTransform:"uppercase",color:C.gold}}>{children}</span>
      <div style={{flex:1,height:1,background:`linear-gradient(to right,${C.gold}55,transparent)`}}/>
    </div>
  );
}

function ResultBadge({r}){
  const col=r==="W"?C.green:r==="D"?C.amber:C.red;
  return <div style={{width:24,height:24,borderRadius:"50%",background:col,display:"flex",
    alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:C.white,flexShrink:0}}>{r}</div>;
}

const posCol=pos=>pos==="GK"?"#6C3483":["CB","RB","LB"].includes(pos)?C.navyMid:["DM","CM","AM"].includes(pos)?C.green:"#8B4513";
const statusColor=st=>st.startsWith("✅")?C.greenL:st.startsWith("🔴")?C.red:st.startsWith("🟡")?C.amber:st.startsWith("⚠️")?"#E8A020":C.muted;
const statusCol=s=>s==="hot"?C.green:s==="warm"?C.amber:C.muted;
const tagColor=tag=>tag==="Official"?C.goldDim:tag==="Transfer"?C.green:tag==="Fixtures"?C.amber:C.navyMid;
const tagBorder=tag=>tag==="Official"?C.gold:tag==="Transfer"?C.greenL:tag==="Fixtures"?C.amber:C.navyLight;

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <span style={{fontSize:16}}>{r.nat}</span>
                            <span style={{fontSize:15,fontWeight:800}}>{r.player}</span>
                            <Tag label={r.status==="hot"?"🔥 Hot":r.status==="warm"?"♨️ Warm":"❄️ Cold"}
                              color={r.status==="hot"?C.green:r.status==="warm"?"#7D5A00":"#2C3E50"}/>
                          </div>
                          <div style={{fontSize:11,color:C.muted,marginTop:4}}>
                            From: <span style={{color:C.white}}>{r.from}</span>
                            {" · "}Fee: <span style={{color:C.gold,fontWeight:700}}>{r.fee}</span>
                          </div>
                        </div>
                        <div style={{textAlign:"right",fontSize:9,color:C.muted,flexShrink:0}}>{r.date}</div>
                      </div>
                      <div style={{marginTop:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                          <span style={{fontSize:9,color:C.muted}}>LIKELIHOOD</span>
                          <span style={{fontSize:10,fontWeight:800,color:statusCol(r.status)}}>{r.likelihood}%</span>
                        </div>
                        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:4}}>
                          <div style={{width:`${r.likelihood}%`,height:4,borderRadius:99,background:statusCol(r.status)}}/>
                        </div>
                      </div>
                      <div style={{marginTop:5,fontSize:9,color:C.muted}}>{expandedB===i?"▲ Collapse":"▾ Tap for full brief"}</div>
                    </div>
                    {expandedB===i&&(
                      <div style={{padding:"0 16px 14px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                        <div style={{paddingTop:10,fontSize:12,color:C.off,lineHeight:1.8}}>{r.brief}</div>
                        <div style={{marginTop:6,fontSize:9,color:C.muted,fontStyle:"italic"}}>Intelligence from verified club sources</div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* ══ NEWS ══ */}
        {tab==="news" && (
          <Card>
            <SecTitle icon="📰">News Centre — Newest First</SecTitle>
            <div style={{fontSize:10,color:C.muted,marginBottom:12}}>Tap any headline to open the full article in a new tab.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {NEWS.map((n,i)=>(
                <a key={i} href={n.url} target="_blank" rel="noopener noreferrer"
                  style={{display:"block",padding:"13px 16px",background:"rgba(255,255,255,0.04)",borderRadius:10,
                    borderLeft:`3px solid ${tagBorder(n.tag)}`,cursor:"pointer",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(202,171,74,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,lineHeight:1.5,color:C.white}}>{n.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:7,alignItems:"center",flexWrap:"wrap"}}>
                        <Tag label={n.tag} color={tagColor(n.tag)}/>
                        <span style={{fontSize:10,color:C.muted}}>{n.source}</span>
                        <span style={{fontSize:9,color:C.gold}}>↗ Read more</span>
                      </div>
                    </div>
                    <div style={{fontSize:9,color:C.muted,flexShrink:0,marginTop:2,textAlign:"right",minWidth:60}}>{n.date}</div>
                  </div>
                </a>
              ))}
            </div>
          </Card>
        )}

        {/* ══ RECORDS ══ */}
        {tab==="records" && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Sub-nav */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["trophies","🏆 Trophy Cabinet"],["domestic","🏟️ Domestic Records"],["european","🌍 European Records"]].map(([id,label])=>(
                <button key={id} onClick={()=>setRecordSection(id)} style={{
                  background:recordSection===id?C.gold:`${C.navyLight}`,
                  color:recordSection===id?C.navyDark:C.muted,
                  border:`1px solid ${recordSection===id?C.gold:C.muted+"44"}`,
                  borderRadius:8,padding:"8px 14px",fontSize:11,fontWeight:700,cursor:"pointer",
                }}>
                  {label}
                </button>
              ))}
            </div>

            {/* TROPHIES */}
            {recordSection==="trophies" && (
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{padding:"12px 16px",background:`${C.navyDark}BB`,borderRadius:10,fontSize:11,color:C.muted,lineHeight:1.7,border:`1px solid ${C.gold}33`}}>
                  <strong style={{color:C.gold}}>THFC Honours:</strong> 2 League titles · 8 FA Cups · 4 League Cups · 3 European trophies (UEFA Cup x2, Europa League x1, Cup Winners' Cup x1) · 7 Charity/Community Shields<br/>
                  Source: <span style={{color:C.gold}}>tottenhamhotspur.com/the-club/history/club-honours</span>
                </div>
                {TROPHIES.map((t,i)=>(
                  <Card key={i}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:800,color:C.gold}}>{t.comp}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                          {t.years.map((y,j)=>(
                            <span key={j} style={{padding:"3px 8px",background:C.navyDark,border:`1px solid ${C.gold}44`,borderRadius:4,fontSize:10,color:C.gold,fontWeight:700}}>{y}</span>
                          ))}
                        </div>
                        <div style={{marginTop:10,fontSize:11,color:C.muted,lineHeight:1.6}}>{t.detail}</div>
                      </div>
                      <div style={{textAlign:"center",flexShrink:0}}>
                        <div style={{fontSize:36,fontWeight:900,color:C.gold}}>{t.wins}</div>
                        <div style={{fontSize:9,color:C.muted}}>WINS</div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}

            {/* DOMESTIC RECORDS */}
            {recordSection==="domestic" && (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{padding:"10px 14px",background:`${C.navyDark}BB`,borderRadius:8,fontSize:10,color:C.muted,border:`1px solid ${C.gold}33`}}>
                  Source: <span style={{color:C.gold}}>Wikipedia — List of Tottenham Hotspur F.C. records and statistics</span>
                </div>
                {RECORDS.domestic.map((r,i)=>(
                  <Card key={i} style={{padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{r.cat}</div>
                        <div style={{fontSize:14,fontWeight:800,color:C.gold}}>{r.record}</div>
                        <div style={{fontSize:11,color:C.off,marginTop:6,lineHeight:1.6}}>{r.detail}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:10,color:C.gold,fontWeight:700}}>{r.when}</div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}

            {/* EUROPEAN RECORDS */}
            {recordSection==="european" && (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{padding:"10px 14px",background:`${C.navyDark}BB`,borderRadius:8,fontSize:10,color:C.muted,border:`1px solid ${C.gold}33`}}>
                  Source: <span style={{color:C.gold}}>Wikipedia — List of Tottenham Hotspur F.C. records and statistics</span>
                </div>
                {RECORDS.european.map((r,i)=>(
                  <Card key={i} style={{padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{r.cat}</div>
                        <div style={{fontSize:14,fontWeight:800,color:C.gold}}>{r.record}</div>
                        <div style={{fontSize:11,color:C.off,marginTop:6,lineHeight:1.6}}>{r.detail}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:10,color:C.gold,fontWeight:700}}>{r.when}</div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"16px",borderTop:`1px solid rgba(202,171,74,0.12)`,
        fontSize:9,color:C.muted,letterSpacing:"0.1em",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <SpursLogo size={18}/>
        AUDERE EST FACERE · THFC 1882 · DATA VERIFIED 27 JUN 2026 · COYS 🐓
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
